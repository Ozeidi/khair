name: build-and-deploy

# main    → production  (khair.ozeidi.io,      image tag :prod)
# develop → staging     (khair-test.ozeidi.io, image tag :staging)
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name + environment tag
        id: meta
        run: |
          # GHCR requires an all-lowercase image path.
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/khair"
          if [ "${{ github.ref_name }}" = "main" ]; then TAG=prod; else TAG=staging; fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Requires GitHub Environments "production" / "staging" with the deploy secrets.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Deploy over SSH (pull + up on the VPS)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          printf '%s\n' "$SSH_DEPLOY_KEY" > deploy_key
          chmod 600 deploy_key
          DIR=${{ github.ref_name == 'main' && '/root/apps/khair-prod' || '/root/apps/khair-staging' }}
          ssh -i deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              "${SSH_USER:-root}@${SSH_HOST}" \
              "cd $DIR && docker compose pull && docker compose up -d && docker image prune -f"
          rm -f deploy_key
