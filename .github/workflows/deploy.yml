name: build-and-deploy

# main    → production  (khair.ozeidi.io,      image tag :prod)
# develop → staging     (khair-test.ozeidi.io, image tag :staging)
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

# Deny-all by default; each job opts into exactly what it needs.
permissions: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name + environment tag (fail-closed on unknown branch)
        id: meta
        env:
          REF: ${{ github.ref_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # GHCR requires an all-lowercase image path.
          IMAGE="ghcr.io/$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')/khair"
          case "$REF" in
            main)    TAG=prod ;;
            develop) TAG=staging ;;
            *) echo "::error::Refusing to build/deploy from branch '$REF' (only main/develop)."; exit 1 ;;
          esac
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read           # lets the VPS pull the GHCR image via the job token
    # Requires GitHub Environments "production" / "staging" holding the deploy secrets.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Deploy over SSH (pull + up on the VPS)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          KEYFILE="$RUNNER_TEMP/deploy_key"
          KNOWN="$RUNNER_TEMP/known_hosts"
          trap 'rm -f "$KEYFILE" "$KNOWN"' EXIT          # always clean up, even on failure

          printf '%s\n' "$SSH_DEPLOY_KEY"  > "$KEYFILE"; chmod 600 "$KEYFILE"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$KNOWN"

          case "$REF" in
            main)    DIR=/root/apps/khair-prod ;;
            develop) DIR=/root/apps/khair-staging ;;
            *) echo "::error::Refusing to deploy from branch '$REF'."; exit 1 ;;
          esac

          # Pipe the ephemeral GHCR token over ssh stdin → docker login --password-stdin
          # (keeps it out of argv/process list on the VPS). Then pull + recreate.
          printf '%s' "$GHCR_TOKEN" | ssh -i "$KEYFILE" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="$KNOWN" \
              "${SSH_USER:-root}@${SSH_HOST}" \
              "docker login ghcr.io -u '$GHCR_USER' --password-stdin \
               && cd $DIR && docker compose pull && docker compose up -d && docker image prune -f"
