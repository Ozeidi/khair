# Staging/test deployment on the ozeidi.io VPS (compose project: khair-staging).
# Lives on the server at /root/apps/khair-staging/docker-compose.yml.
# Same topology as prod (see ../prod/docker-compose.yml) but the `staging` image,
# a `khair-staging` network alias, its own DB, and demo data seeded on first boot.
services:
  app:
    image: ghcr.io/ozeidi/khair:staging
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SEED_DEMO: "1"                 # seed demo accounts/projects on the test site
    volumes:
      - media:/app/media
    networks:
      frontend:
        aliases: [khair-staging]     # nginx proxy_pass http://khair-staging:8000
      backend: {}
    healthcheck:
      # X-Forwarded-Proto avoids the app's HTTPS redirect so we validate the real
      # readiness view (200 = DB reachable), not just a 301.
      test: ["CMD", "curl", "-fsS", "-H", "X-Forwarded-Proto: https", "http://localhost:8000/health/ready/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: ghcr.io/ozeidi/khair:staging
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_MIGRATIONS: "0"           # only the app container migrates the shared DB
    command: >
      bash -c "while true; do
        python manage.py process_outbox || true;
        python manage.py send_due_reminders || true;
        touch /tmp/worker.heartbeat;
        sleep 60;
      done"
    volumes:
      - media:/app/media
    networks:
      backend: {}
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker.heartbeat -mmin -3 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  media:

networks:
  frontend:
    external: true
    name: stack_frontend
  backend:
    external: true
    name: stack_backend
