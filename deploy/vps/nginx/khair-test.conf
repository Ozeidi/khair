# Staging vhost — khair-test.ozeidi.io
# Install on the VPS at /root/stack/nginx/conf.d/khair-test.conf, then:
#   docker exec nginx nginx -t && docker exec nginx nginx -s reload
# (TLS cert must already cover khair-test.ozeidi.io — see DEPLOYMENT.md §4.)

server {
    listen 80;
    server_name khair-test.ozeidi.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name khair-test.ozeidi.io;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 25m;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $up khair-staging;

    location / {
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
