# Production deployment on the ozeidi.io VPS (compose project: khair-prod).
# Lives on the server at /root/apps/khair-prod/docker-compose.yml.
#
# Topology (per VPS_Handover.md §7):
#   • App is reached by the central nginx as http://khair-prod:8000 over stack_frontend.
#   • App reaches the SHARED Postgres/Redis as postgres:5432 / redis:6379 over stack_backend.
#   • NO published ports — nothing is exposed to the internet except via nginx (TLS).
#   • Image is pulled from GHCR (built by CI); never built on the server.
services:
  app:
    image: ghcr.io/ozeidi/khair:prod
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SEED_DEMO: "0"                 # never auto-seed demo data in production
    volumes:
      - media:/app/media
    networks:
      frontend:
        aliases: [khair-prod]        # nginx proxy_pass http://khair-prod:8000
      backend: {}
    healthcheck:
      # X-Forwarded-Proto avoids the app's HTTPS redirect so we validate the real
      # readiness view (200 = DB reachable), not just a 301.
      test: ["CMD", "curl", "-fsS", "-H", "X-Forwarded-Proto: https", "http://localhost:8000/health/ready/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Outbox + due-reminder processor (no web port; shares the same image/.env).
  worker:
    image: ghcr.io/ozeidi/khair:prod
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_MIGRATIONS: "0"           # only the app container migrates the shared DB
    command: >
      bash -c "while true; do
        python manage.py process_outbox || true;
        python manage.py send_due_reminders || true;
        touch /tmp/worker.heartbeat;
        sleep 60;
      done"
    volumes:
      - media:/app/media
    networks:
      backend: {}
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker.heartbeat -mmin -3 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  media:

networks:
  frontend:
    external: true
    name: stack_frontend
  backend:
    external: true
    name: stack_backend
